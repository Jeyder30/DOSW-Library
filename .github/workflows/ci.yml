name: CI

on:
  pull_request:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Maven compile
        run: ./mvnw -B compile

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Nota sobre verify y compilacion
        run: |
          echo "mvn verify compila y ejecuta pruebas en un runner limpio."
          echo "No se pueden ejecutar tests sin compilar el codigo fuente;"
          echo "el job build garantiza que compile antes; verify vuelve a compilar aqui (artefactos no se comparten entre jobs por defecto)."

      - name: Maven verify
        run: ./mvnw -B verify

      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
        if: always()

  analysis:
    name: analysis
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: PMD (revision estatica)
        run: ./mvnw -B compile pmd:check

      - name: Descargar cobertura generada en test
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Listar reporte de cobertura
        run: ls -la target/site/jacoco || true

  deploy:
    name: deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue
        run: echo "En construcción ..."
